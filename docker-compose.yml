version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: huntlink-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-huntlink_root_password_2026}
      MYSQL_DATABASE: huntlink
      MYSQL_USER: huntlink
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-huntlink_user_password_2026}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      - huntlink-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: huntlink-backend
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: huntlink
      DB_PASSWORD: ${MYSQL_PASSWORD:-huntlink_user_password_2026}
      DB_DATABASE: huntlink
      JWT_SECRET: ${JWT_SECRET:-huntlink-jwt-secret-key-2026-change-in-production}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - huntlink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: huntlink-frontend
    restart: always
    environment:
      VITE_API_BASE_URL: http://150.158.51.199:3000/api
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - huntlink-network

networks:
  huntlink-network:
    driver: bridge

volumes:
  mysql-data:
