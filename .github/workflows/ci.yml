name: HuntLink CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # 构建和测试阶段
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend-web/package-lock.json
    
    - name: Install backend dependencies
      run: cd backend && npm ci
    
    - name: Install frontend dependencies
      run: cd frontend-web && npm ci
    
    # ==================== 关键：Type Check 必须在 Build 之前 ====================
    - name: Type Check backend
      run: cd backend && npx tsc --noEmit
      env:
        NODE_OPTIONS: --max-old-space-size=4096
    
    - name: Type Check frontend
      run: cd frontend-web && npx tsc --noEmit || echo "Frontend type check skipped (may not have strict mode)"
      env:
        NODE_OPTIONS: --max-old-space-size=4096
    
    - name: Build backend
      run: cd backend && npm run build
      env:
        NODE_OPTIONS: --max-old-space-size=4096
    
    - name: Build frontend
      run: cd frontend-web && npm run build
      env:
        NODE_OPTIONS: --max-old-space-size=4096
    
    - name: Run backend tests
      run: cd backend && npm test -- --passWithNoTests
      env:
        NODE_ENV: test

  # 部署阶段（仅在 master 分支）
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Backup current deployment
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          if [ -d "/var/www/huntlink" ]; then
            BACKUP_DIR="/var/www/huntlink-backup-$(date +%Y%m%d-%H%M%S)"
            cp -r /var/www/huntlink "$BACKUP_DIR"
            echo "✅ Backup created: $BACKUP_DIR"
          fi
    
    - name: Deploy to Tencent Cloud
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          set -e
          
          echo "========================================="
          echo "🚀 Deploying HuntLink..."
          echo "========================================="
          
          cd /var/www/huntlink || (mkdir -p /var/www/huntlink && cd /var/www/huntlink)
          
          if [ -d ".git" ]; then
            echo "📦 Pulling latest code..."
            git fetch origin
            git reset --hard origin/master
          else
            echo "📦 Cloning repository..."
            git clone https://github.com/Liman-fully/huntlink.git .
          fi
          
          echo "⚙️ Setting up environment..."
          [ ! -f "backend/.env" ] && cp backend/.env.example backend/.env
          [ ! -f "frontend-web/.env" ] && cp frontend-web/.env.example frontend-web/.env
          
          echo "🐳 Starting services (Direct Node + PM2)..."
          
          # 停止旧进程
          pkill -f "node dist/src/main" 2>/dev/null || true
          sleep 2
          
          # 安装依赖并构建
          cd /var/www/huntlink/backend
          npm ci --production=false
          npm run build
          
          # 启动后端（带内存限制）
          NODE_ENV=production NODE_OPTIONS="--max-old-space-size=1536" \
            nohup node dist/src/main.js > backend.log 2>&1 &
          
          sleep 8
          
          # 验证启动
          if pgrep -f "node dist/src/main" > /dev/null; then
            echo "✅ Backend started successfully"
          else
            echo "❌ Backend failed to start"
            cat backend.log
            exit 1
          fi
          
          echo "⏳ Waiting for services..."
          sleep 5
          
          echo "🏥 Health check..."
          curl -s -o /dev/null -w "Backend API: HTTP %{http_code}\n" http://localhost:3000/api/docs || true
          pgrep -af "node dist/src/main" || true
          
          echo "========================================="
          echo "✅ Deployment completed!"
          echo "========================================="
          echo "Frontend: http://${{ secrets.SERVER_HOST }}"
          echo "Backend: http://${{ secrets.SERVER_HOST }}:3000/api"
    
    - name: Rollback on failure
      if: failure()
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          echo "🔄 Rolling back to previous version..."
          LATEST_BACKUP=$(ls -dt /var/www/huntlink-backup-* 2>/dev/null | head -1)
          if [ -n "$LATEST_BACKUP" ]; then
            echo "Restoring from: $LATEST_BACKUP"
            # 停止当前进程
            pkill -f "node dist/src/main" 2>/dev/null || true
            sleep 2
            # 恢复代码
            rm -rf /var/www/huntlink
            cp -r "$LATEST_BACKUP" /var/www/huntlink
            # 重启服务
            cd /var/www/huntlink/backend
            NODE_ENV=production NODE_OPTIONS="--max-old-space-size=1536" \
              nohup node dist/src/main.js > backend.log 2>&1 &
            echo "✅ Rollback completed"
          else
            echo "⚠️ No backup found"
          fi
