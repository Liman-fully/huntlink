name: HuntLink CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # 构建和测试阶段
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend-web/package-lock.json
    
    - name: Install backend dependencies
      run: cd backend && npm ci
    
    - name: Install frontend dependencies
      run: cd frontend-web && npm ci
    
    - name: Build backend
      run: cd backend && npm run build
    
    - name: Build frontend
      run: cd frontend-web && npm run build
    
    - name: Run backend tests
      run: cd backend && npm test -- --passWithNoTests
      env:
        NODE_ENV: test

  # 部署阶段（仅在 master 分支）
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Backup current deployment
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          if [ -d "/var/www/huntlink" ]; then
            BACKUP_DIR="/var/www/huntlink-backup-$(date +%Y%m%d-%H%M%S)"
            cp -r /var/www/huntlink "$BACKUP_DIR"
            echo "✅ Backup created: $BACKUP_DIR"
          fi
    
    - name: Deploy to Tencent Cloud
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          set -e
          
          echo "========================================="
          echo "🚀 Deploying HuntLink..."
          echo "========================================="
          
          cd /var/www/huntlink || (mkdir -p /var/www/huntlink && cd /var/www/huntlink)
          
          if [ -d ".git" ]; then
            echo "📦 Pulling latest code..."
            git fetch origin
            git reset --hard origin/master
          else
            echo "📦 Cloning repository..."
            git clone https://github.com/Liman-fully/huntlink.git .
          fi
          
          echo "⚙️ Setting up environment..."
          [ ! -f "backend/.env" ] && cp backend/.env.example backend/.env
          [ ! -f "frontend-web/.env" ] && cp frontend-web/.env.example frontend-web/.env
          
          echo "🐳 Starting Docker services..."
          docker-compose down || true
          docker-compose up -d --build
          
          echo "⏳ Waiting for services..."
          sleep 30
          
          echo "🏥 Health check..."
          docker-compose ps
          
          # 检查服务健康状态
          if ! docker-compose ps | grep -q "healthy"; then
            echo "❌ Health check failed, rolling back..."
            docker-compose down
            exit 1
          fi
          
          echo "========================================="
          echo "✅ Deployment completed!"
          echo "========================================="
          echo "Frontend: http://${{ secrets.SERVER_HOST }}"
          echo "Backend: http://${{ secrets.SERVER_HOST }}:3000/api"
    
    - name: Rollback on failure
      if: failure()
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          echo "🔄 Rolling back to previous version..."
          LATEST_BACKUP=$(ls -dt /var/www/huntlink-backup-* 2>/dev/null | head -1)
          if [ -n "$LATEST_BACKUP" ]; then
            docker-compose -f "$LATEST_BACKUP/docker-compose.yml" up -d
            echo "✅ Rollback completed"
          else
            echo "⚠️ No backup found"
          fi
