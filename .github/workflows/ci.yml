name: HuntLink CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci
    
    - name: Run backend linter
      working-directory: ./backend
      run: npm run lint
    
    - name: Run backend tests
      working-directory: ./backend
      run: npm run test
      continue-on-error: true  # E2E 测试可能需要数据库
    
    - name: Build backend
      working-directory: ./backend
      run: npm run build

  test-frontend-web:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend-web/package-lock.json
    
    - name: Install frontend dependencies
      working-directory: ./frontend-web
      run: npm ci
    
    - name: Run frontend linter
      working-directory: ./frontend-web
      run: npm run lint
    
    - name: Run frontend tests
      working-directory: ./frontend-web
      run: npm run test
      continue-on-error: true
    
    - name: Build frontend
      working-directory: ./frontend-web
      run: npm run build

  deploy:
    needs: [test-backend, test-frontend-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Tencent Cloud
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          echo "🚀 开始部署猎脉 HuntLink..."
          
          # 创建部署目录
          mkdir -p /var/www/huntlink
          cd /var/www/huntlink
          
          # 拉取最新代码
          if [ -d ".git" ]; then
            echo "📦 更新代码..."
            git pull origin main
          else
            echo "📦 克隆仓库..."
            git clone https://github.com/Liman-fully/huntlink.git .
          fi
          
          # 配置环境变量
          if [ ! -f ".env" ]; then
            echo "⚙️  创建环境变量..."
            cp backend/.env.example backend/.env
            sed -i "s/DATABASE_PASSWORD=.*/DATABASE_PASSWORD=${{ secrets.MYSQL_PASSWORD }}/" backend/.env
            sed -i "s/JWT_SECRET=.*/JWT_SECRET=${{ secrets.JWT_SECRET }}/" backend/.env
          fi
          
          # 检查 Docker
          if ! command -v docker &> /dev/null; then
            echo "❌ Docker 未安装，正在安装..."
            curl -fsSL https://get.docker.com | sh
          fi
          
          if ! command -v docker-compose &> /dev/null; then
            echo "📦 安装 Docker Compose..."
            curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            chmod +x /usr/local/bin/docker-compose
          fi
          
          # 部署
          echo "🐳 启动服务..."
          docker-compose down
          docker-compose up -d --build
          
          # 等待服务启动
          echo "⏳ 等待服务启动..."
          sleep 10
          
          # 健康检查
          echo "🏥 健康检查..."
          docker-compose ps
          
          echo "✅ 部署完成！"
          echo "前端：http://${{ secrets.SERVER_HOST }}"
          echo "后端：http://${{ secrets.SERVER_HOST }}:3000"
