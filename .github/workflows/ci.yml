name: HuntLink CI/CD

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Tencent Cloud
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          set -e
          
          echo "========================================="
          echo "🚀 Deploying HuntLink..."
          echo "========================================="
          
          cd /var/www/huntlink || (mkdir -p /var/www/huntlink && cd /var/www/huntlink)
          
          if [ -d ".git" ]; then
            echo "📦 Pulling latest code..."
            git pull origin master
          else
            echo "📦 Cloning repository..."
            git clone https://github.com/Liman-fully/huntlink.git .
          fi
          
          echo "⚙️ Setting up environment..."
          [ ! -f "backend/.env" ] && cp backend/.env.example backend/.env
          [ ! -f "frontend-web/.env" ] && cp frontend-web/.env.example frontend-web/.env
          
          echo "🐳 Starting Docker services..."
          docker-compose down || true
          docker-compose up -d --build
          
          echo "⏳ Waiting for services..."
          sleep 15
          
          echo "🏥 Health check..."
          docker-compose ps
          
          echo "========================================="
          echo "✅ Deployment completed!"
          echo "========================================="
          echo "Frontend: http://${{ secrets.SERVER_HOST }}"
          echo "Backend: http://${{ secrets.SERVER_HOST }}:3000/api"
